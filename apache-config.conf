# Apache Configuration for Shcrabble
# Add this to your virtual host configuration
#
# Location: typically /etc/apache2/sites-available/your-site.conf
#
# Before using:
# 1. Enable required modules: sudo a2enmod proxy proxy_http proxy_wstunnel rewrite
# 2. Add the configuration below to your <VirtualHost *:443> section
# 3. Reload Apache: sudo systemctl reload apache2

# Shcrabble reverse proxy configuration
# This assumes your Node.js server runs on port 3000

# WebSocket support (required for Socket.io)
ProxyPass /shcrabble/socket.io/ ws://localhost:3000/socket.io/
ProxyPassReverse /shcrabble/socket.io/ ws://localhost:3000/socket.io/

# HTTP proxy for all other requests
ProxyPass /shcrabble/ http://localhost:3000/shcrabble/
ProxyPassReverse /shcrabble/ http://localhost:3000/shcrabble/

# Preserve host header
ProxyPreserveHost On

# Optional: Add headers for WebSocket upgrade
<Location /shcrabble/>
    # Allow WebSocket connections
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/shcrabble/?(.*) ws://localhost:3000/shcrabble/$1 [P,L]
</Location>

