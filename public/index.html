<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shcrabble - Shavian Scrabble</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Landing/Lobby Screen -->
    <div id="lobby-screen">
      <h1>𐑖𐑒𐑮𐑨𐑚𐑩𐑤 Shcrabble</h1>
      <p>Multiplayer Scrabble in the Shavian Alphabet</p>

      <div id="lobby-options">
        <div class="lobby-option">
          <h2>Create New Game</h2>
          <input type="text" id="host-name" placeholder="Your name" maxlength="20">
          <button id="create-game-btn">Create Game</button>
        </div>

        <div class="lobby-option">
          <h2>Join Game</h2>
          <input type="text" id="join-name" placeholder="Your name" maxlength="20">
          <input type="text" id="game-id" placeholder="Game ID (or use link)">
          <button id="join-game-btn">Join Game</button>
        </div>
      </div>

      <div id="invite-link-container" style="display: none;">
        <h3>Game Created!</h3>
        <p>Share this link with other players:</p>
        <div class="invite-link">
          <input type="text" id="invite-link" readonly>
          <button id="copy-link-btn">Copy</button>
        </div>
        <p class="waiting-message">Waiting for players to join...</p>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" style="display: none;">
      <div id="game-header">
        <h1>𐑖𐑒𐑮𐑨𐑚𐑩𐑤 Shcrabble</h1>
        <div id="game-info">
          <span id="tiles-remaining">Tiles: 100</span>
          <button id="pass-turn-btn">Pass Turn</button>
        </div>
      </div>

      <div id="game-container">
        <div id="players-panel">
          <h2>Players</h2>
          <div id="players-list"></div>
        </div>

        <div id="board-container">
          <div id="board"></div>
        </div>

        <div id="rack-container">
          <h3>Your Rack</h3>
          <div id="rack"></div>
          <div id="move-controls">
            <button id="submit-move-btn" disabled>Submit Move</button>
            <button id="recall-tiles-btn">Recall Tiles</button>
          </div>
        </div>
      </div>

      <div id="message-area"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
