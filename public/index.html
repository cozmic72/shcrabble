<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shcrabble - Shavian Scrabble</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Settings Dialog -->
  <div id="settings-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog">
      <div class="dialog-header">
        <h2 data-i18n="settings">Settings</h2>
        <button class="close-dialog" data-dialog="settings-dialog" aria-label="Close">×</button>
      </div>
      <div class="dialog-content">
        <div class="setting-item">
          <label data-i18n="script">Script</label>
          <select id="language-select">
            <option value="en" data-i18n="roman">Roman</option>
            <option value="shaw" data-i18n="shavian">Shavian</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- About Dialog -->
  <div id="about-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog">
      <div class="dialog-header">
        <h2 data-i18n="about">About</h2>
        <button class="close-dialog" data-dialog="about-dialog" aria-label="Close">×</button>
      </div>
      <div id="about-content">
        <!-- Loaded dynamically from i18n -->
      </div>
    </div>
  </div>

  <!-- Welcome Dialog -->
  <div id="welcome-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog dialog-large">
      <div class="dialog-header">
        <h2>Welcome!</h2>
        <button class="close-dialog" data-dialog="welcome-dialog" aria-label="Close">×</button>
      </div>
      <div id="welcome-content">
        <!-- Loaded dynamically from i18n -->
      </div>
      <div class="dialog-footer">
        <label class="checkbox-label">
          <input type="checkbox" id="dont-show-welcome">
          <span data-i18n="dontShowAgain">Don't show this again</span>
        </label>
        <button id="welcome-close-btn" class="primary-btn" data-i18n="close">Close</button>
      </div>
    </div>
  </div>

  <div id="app">
    <!-- Landing/Lobby Screen -->
    <div id="lobby-screen">
      <!-- Burger Menu -->
      <div id="burger-menu">
        <button id="burger-btn" aria-label="Menu">☰</button>
        <div id="burger-dropdown" class="dropdown" style="display: none;">
          <button class="menu-item" id="settings-menu-btn" data-i18n="settings">Settings</button>
          <button class="menu-item" id="about-menu-btn" data-i18n="about">About</button>
        </div>
      </div>

      <h1 data-i18n="appTitle">𐑖𐑒𐑮𐑨𐑚𐑩𐑤 Shcrabble</h1>
      <p data-i18n="appSubtitle">Multiplayer Scrabble in the Shavian Alphabet</p>
      <p class="copyright">&copy; <a href="https://joro.io" target="_blank">joro.io</a></p>

      <div id="lobby-options">
        <div class="lobby-option">
          <h2 data-i18n="createNewGame">Create New Game</h2>
          <input type="text" id="host-name" data-i18n="yourName" data-i18n-placeholder="true" placeholder="Your name" maxlength="20">
          <button id="create-game-btn" data-i18n="createGameBtn">Create Game</button>
        </div>

        <div class="lobby-option">
          <h2 data-i18n="joinGame">Join Game</h2>
          <input type="text" id="join-name" data-i18n="yourName" data-i18n-placeholder="true" placeholder="Your name" maxlength="20">
          <input type="text" id="game-id" data-i18n="gameId" data-i18n-placeholder="true" placeholder="Game ID (or use link)">
          <button id="join-game-btn" data-i18n="joinGameBtn">Join Game</button>
        </div>
      </div>

      <div id="invite-link-container" style="display: none;">
        <h3 data-i18n="gameCreated">Game Created!</h3>
        <p data-i18n="shareLink">Share this link with other players:</p>
        <div class="invite-link">
          <input type="text" id="invite-link" readonly>
          <button id="copy-link-btn" data-i18n="copyBtn">Copy</button>
        </div>
        <p class="waiting-message" data-i18n="waitingForPlayers">Waiting for players to join...</p>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" style="display: none;">
      <!-- Burger Menu -->
      <div id="burger-menu">
        <button id="burger-btn" aria-label="Menu">☰</button>
        <div id="burger-dropdown" class="dropdown" style="display: none;">
          <button class="menu-item" id="settings-menu-btn" data-i18n="settings">Settings</button>
          <button class="menu-item" id="about-menu-btn" data-i18n="about">About</button>
        </div>
      </div>

      <div id="game-header">
        <h1 data-i18n="appTitle">𐑖𐑒𐑮𐑨𐑚𐑩𐑤 Shcrabble</h1>
        <div id="game-info">
          <span id="tiles-remaining"><span data-i18n="tilesRemaining">Tiles</span>: 100</span>
          <button id="pass-turn-btn" data-i18n="passTurn">Pass Turn</button>
        </div>
      </div>

      <div id="game-container">
        <div id="players-panel">
          <h2 data-i18n="players">Players</h2>
          <div id="players-list"></div>
        </div>

        <div id="board-container">
          <div id="board"></div>
        </div>

        <div id="rack-container">
          <h3 data-i18n="yourRack">Your Rack</h3>
          <div id="rack"></div>
          <div id="move-controls">
            <button id="submit-move-btn" data-i18n="submitMove" disabled>Submit Move</button>
            <button id="recall-tiles-btn" data-i18n="recallTiles">Recall Tiles</button>
          </div>
        </div>
      </div>

      <div id="message-area"></div>
    </div>
  </div>

  <script src="../socket.io/socket.io.js"></script>
  <script src="i18n.js"></script>
  <script src="game.js"></script>
</body>
</html>
