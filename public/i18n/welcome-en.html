<div class="dialog-content">
  <h2>Welcome to Shcrabble!</h2>

  <p>To improve gameplay, Shcrabble doesn't include the compound letters <strong>𐑽 𐑼 𐑸 𐑹 𐑾 𐑿</strong>.</p>

  <p>To write words with compounds, use their split forms instead:</p>

  <div class="compound-breakdown">
    <div class="breakdown-row">
      <span class="tile">𐑦</span>
      <span class="operator">+</span>
      <span class="tile">𐑩</span>
      <span class="operator">+</span>
      <span class="tile">𐑮</span>
      <span class="operator">=</span>
      <span class="tile compound">𐑽</span>
    </div>
    <div class="breakdown-row">
      <span class="tile">𐑩</span>
      <span class="operator">+</span>
      <span class="tile">𐑮</span>
      <span class="operator">=</span>
      <span class="tile compound">𐑼</span>
    </div>
    <div class="breakdown-row">
      <span class="tile">𐑭</span>
      <span class="operator">+</span>
      <span class="tile">𐑮</span>
      <span class="operator">=</span>
      <span class="tile compound">𐑸</span>
    </div>
    <div class="breakdown-row">
      <span class="tile">𐑷</span>
      <span class="operator">+</span>
      <span class="tile">𐑮</span>
      <span class="operator">=</span>
      <span class="tile compound">𐑹</span>
    </div>
    <div class="breakdown-row">
      <span class="tile">𐑦</span>
      <span class="operator">+</span>
      <span class="tile">𐑩</span>
      <span class="operator">=</span>
      <span class="tile compound">𐑾</span>
    </div>
    <div class="breakdown-row">
      <span class="tile">𐑘</span>
      <span class="operator">+</span>
      <span class="tile">𐑵</span>
      <span class="operator">=</span>
      <span class="tile compound">𐑿</span>
    </div>
  </div>
</div>
